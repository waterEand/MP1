defaults:
  - task: adroit_hammer

name: train_sugar_flowpolicy

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "debug"

horizon: 4
n_obs_steps: 2
n_action_steps: 4
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: mp1.policy.sugar_flowpolicy.SugarFlowPolicy

  # ── encoder selection ──────────────────────────────────────────────────────
  encoder_type: sugar        # "mlp" or "sugar"
  encoder_output_dim: 64     # output dim of the point cloud extractor

  # ── SUGAR encoder (active when encoder_type=sugar) ─────────────────────────
  # per_token_output=false → global max-pool → FiLM conditioning (condition_type: film)
  # per_token_output=true  → all tokens → cross-attention (condition_type: cross_attention)
  sugar_encoder_cfg:
    pretrained_path: assets/sugar_objaverse.pt
    num_groups: 32          # FPS centers; 32 groups × 32 pts = 1024 = target_npoints
    group_size: 32          # matches pretraining — critical for local feature quality
    target_npoints: 1024    # upsample 512-pt input to 1024 before grouping
    hidden_size: 384        # must match pretrained weights
    num_heads: 6
    depth: 12
    drop_path_rate: 0.1
    freeze: true
    finetune_last_n_layers: 2
    out_channels: ${policy.encoder_output_dim}
    projection_hidden_dim: 256
    per_token_output: false  # true → use condition_type: cross_attention_film below

  # ── MLP encoder (active when encoder_type=mlp) ─────────────────────────────
  # NOTE: when encoder_type=sugar, RGB is always forwarded if present in the
  #       dataset point cloud (channels 3-5). use_pc_color only controls MLP.
  use_pc_color: false
  pointnet_type: "mlp"
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false

  # ── UNet / flow matching (unchanged from flowpolicy) ───────────────────────
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 128
  down_dims:
    - 512
    - 1024
    - 2048
  crop_shape:
    - 84
    - 84
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  obs_as_global_cond: true
  shape_meta: ${shape_meta}


ema:
  _target_: mp1.model.mean.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128            # reduced from 128; SUGAR encoder is heavier
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 100
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  max_grad_norm: 1.0
  ema_decay: 0.95

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${exp_name}_${training.seed}
  project: sugar_fp
  resume: true
  tags:
    - sugar_fp

checkpoint:
  save_ckpt: False
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
